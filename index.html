<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
    <title>Calculator</title>
</head>
<body>
    <div class="container">
        <div class="display">
            <input type="text" placeholder="0">
        </div>
        <div class="main">
            <div class="numbers">
                <button>7</button>
                <button>8</button>
                <button>9</button>
                <button>4</button>
                <button>5</button>
                <button>6</button>
                <button>1</button>
                <button>2</button>
                <button>3</button>
                <p></p>
                <p></p>
                <p></p>
            </div>
            <div class="operators">
                <button style="width: 250px;">AC</button>
                <button>x</button>
                <button>/</button>
                <div class="equalsBox">
                    <div class="left-buttons">
                        <button id="plus">+</button>
                        <button>-</button>
                    </div>
                    <button style="height: 250px">=</button>
                </div>

            </div>
        </div>
    </div>
</body>
</html>
